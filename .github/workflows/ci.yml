name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # The automated suite drives connectors against recorded fixtures and never
    # launches a real browser, so skip Playwright's ~150MB Chromium download on
    # install. The opt-in smoke script installs it on demand.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck (server + CLI)
        run: npm run typecheck

      - name: Typecheck (web)
        run: npm run typecheck:web

      - name: Test (with coverage gate)
        run: npm run test:coverage

      - name: Test (web dashboard)
        run: npm run test:web

      - name: Build web dashboard
        run: npm run build:web
