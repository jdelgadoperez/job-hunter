name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Reads Conventional Commits since the last release, opens/updates a "Release PR" that bumps
      # package.json + updates CHANGELOG.md, and — when that PR is merged — tags and cuts the GitHub
      # Release. No version numbers are chosen by hand; feat -> minor, fix -> patch.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
