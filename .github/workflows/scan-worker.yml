name: scan-worker

# Runs the shared sourcing crawl centrally and writes deduplicated postings to Postgres, which
# local clients read as a feed (hybrid remote mode). The worker runs once and exits, so this cron
# is what makes the hosted feed populate on its own. It does NO scoring and touches only public data.
# See docs/backend/worker-runbook.md.
#
# Requires the repo Actions secret DATABASE_URL (service-role Postgres connection). Without it the
# worker exits 1 with a clear message. THE_MUSE_API_KEY is optional (enables The Muse lead source).

on:
  schedule:
    # Once a day at 09:17 UTC (off the :00 stampede). GitHub cron is always UTC.
    - cron: "17 9 * * *"
  workflow_dispatch: {}

# A crawl can run ~20-30 min and grows with the directory; never let two overlap (the store is
# idempotent, but two concurrent crawls waste runner time and double the load on the ATS boards).
concurrency:
  group: scan-worker
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # Comfortably above the worker's own 25-min crawl budget (JOB_HUNTER_SCAN_BUDGET_MS): the crawl
    # stops itself and persists a partial feed before this hard limit, so the job never gets killed
    # mid-crawl with nothing written. Headroom covers directory read + the post-crawl DB write.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        # The crawl drives a real browser (Airtable directory read + browser-fallback connector),
        # so unlike the CI workflow we DO need Chromium here.
        run: npx playwright install --with-deps chromium

      - name: Run the scanner worker
        # Tee the worker output to a file so the next step can build a run summary from it. The
        # default shell runs with `set -eo pipefail`, so a worker failure still fails the step.
        run: npm run scan:worker 2>&1 | tee scan.log
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JOB_HUNTER_THE_MUSE_API_KEY: ${{ secrets.THE_MUSE_API_KEY }}

      - name: Run summary
        # Render a quick, human-readable summary on the run's page (no log-digging). Runs even on
        # failure so a failed run still gets a one-line verdict instead of a silent red X.
        if: always()
        run: |
          {
            echo "## 🛰️ scan-worker"
            echo
            if [ ! -f scan.log ]; then
              echo "Worker produced no output (failed before logging) — see job logs."
              exit 0
            fi
            done_line=$(grep -E '^\[scanner\] done:' scan.log | tail -n1 || true)
            if [ -n "$done_line" ]; then
              echo "✅ **${done_line#"[scanner] "}**"
            else
              echo "❌ Worker did not finish — see job logs."
            fi
            echo
            warn_count=$(grep -cE '^\[scanner\] ! ' scan.log || true)
            echo "**Warnings:** ${warn_count:-0}"
            if [ "${warn_count:-0}" -gt 0 ]; then
              echo
              echo "<details><summary>Show warnings</summary>"
              echo
              echo '```'
              grep -E '^\[scanner\] ! ' scan.log
              echo '```'
              echo
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
